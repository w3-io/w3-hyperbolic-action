name: 'W3 Hyperbolic Action'
description: 'AI inference and GPU compute via Hyperbolic — text, image, audio, vision, and on-demand GPUs'
author: 'w3-io'

inputs:
  command:
    description: 'Operation: chat, generate-image, generate-audio, analyze-image, rent-gpu, list-gpus, terminate-gpu'
    required: true
  api-key:
    description: 'Hyperbolic API key'
    required: true
  api-url:
    description: 'API base URL override'
    required: false
    default: 'https://api.hyperbolic.xyz'

  # Text generation (chat)
  model:
    description: 'Model ID (e.g. "deepseek-ai/DeepSeek-V3", "meta-llama/Llama-3.3-70B-Instruct")'
    required: false
  messages:
    description: 'Chat messages as JSON array (e.g. [{"role":"user","content":"Hello"}])'
    required: false
  temperature:
    description: 'Sampling temperature (0.0-2.0)'
    required: false
  top-p:
    description: 'Nucleus sampling threshold (0.0-1.0)'
    required: false
  max-tokens:
    description: 'Maximum tokens to generate'
    required: false
  response-format:
    description: 'Response format as JSON (e.g. {"type":"json_schema","json_schema":{...}})'
    required: false
  seed:
    description: 'Random seed for reproducibility'
    required: false
  stop:
    description: 'Comma-separated stop sequences'
    required: false
  tools:
    description: 'Tool definitions as JSON array for function calling'
    required: false

  # Image generation
  prompt:
    description: 'Text prompt for image generation or question for vision analysis'
    required: false
  height:
    description: 'Image height in pixels (default: 1024)'
    required: false
  width:
    description: 'Image width in pixels (default: 1024)'
    required: false
  steps:
    description: 'Number of diffusion steps (default: 25)'
    required: false
  lora:
    description: 'LoRA style adapter name (e.g. "Pixel_Art", "Logo", "Sci-fi")'
    required: false
  lora-weight:
    description: 'LoRA influence weight (0.0-1.0, default: 0.8)'
    required: false

  # Audio generation
  text:
    description: 'Text to convert to speech'
    required: false
  language:
    description: 'TTS language: EN, ES, FR, ZH, JP, KR (default: EN)'
    required: false
  speaker:
    description: 'TTS speaker/accent (e.g. "EN-US", "EN-BR", "EN-AU")'
    required: false
  speed:
    description: 'TTS speed multiplier (0.1-5.0, default: 1.0)'
    required: false

  # Vision
  image-url:
    description: 'URL of image to analyze'
    required: false
  image-base64:
    description: 'Base64-encoded image to analyze'
    required: false

  # GPU compute
  gpu-type:
    description: 'GPU type for rental (e.g. "H100-SXM", "A100-SXM", "RTX-4090")'
    required: false
  gpu-count:
    description: 'Number of GPUs (1, 2, 4, or 8)'
    required: false
    default: '1'
  instance-id:
    description: 'Instance ID for terminate-gpu'
    required: false

outputs:
  result:
    description: 'JSON result of the operation'

runs:
  using: 'node20'
  main: 'dist/index.js'
