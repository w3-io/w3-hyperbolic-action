# E2E Test Workflow
#
# Exercises every command against real APIs.
# Run on a local W3 network with:
#   w3 workflow deploy test/workflows/e2e.yaml
#   w3 workflow "hyperbolic-e2e" trigger
#
# Prerequisites:
#   - W3 local network running (make dev)
#   - W3_SECRET_HYPERBOLIC_API_KEY set to a Hyperbolic API key

name: hyperbolic-e2e

steps:
  # ── Text Generation ────────────────────────────────────────────────────

  - name: Chat completion
    uses: w3-io/w3-hyperbolic-action@v0
    with:
      command: chat
      api-key: ${{ secrets.HYPERBOLIC_API_KEY }}
      model: meta-llama/Llama-3.3-70B-Instruct
      messages: '[{"role":"user","content":"Say hello in exactly three words."}]'
      max-tokens: "50"
      temperature: "0.1"

  # ── Image Generation ───────────────────────────────────────────────────

  - name: Generate an image
    uses: w3-io/w3-hyperbolic-action@v0
    with:
      command: generate-image
      api-key: ${{ secrets.HYPERBOLIC_API_KEY }}
      prompt: A simple blue square on a white background
      height: "512"
      width: "512"
      steps: "10"

  # ── Audio Generation ───────────────────────────────────────────────────

  - name: Generate audio from text
    uses: w3-io/w3-hyperbolic-action@v0
    with:
      command: generate-audio
      api-key: ${{ secrets.HYPERBOLIC_API_KEY }}
      text: This is an end to end test of the Hyperbolic text to speech API.
      language: EN
      speaker: EN-US

  # ── Vision ─────────────────────────────────────────────────────────────

  - name: Analyze an image
    uses: w3-io/w3-hyperbolic-action@v0
    with:
      command: analyze-image
      api-key: ${{ secrets.HYPERBOLIC_API_KEY }}
      image-url: https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/PNG_transparency_demonstration_1.png/280px-PNG_transparency_demonstration_1.png
      prompt: What colors are in this image?

  # ── GPU Compute ────────────────────────────────────────────────────────

  - name: List available GPUs
    uses: w3-io/w3-hyperbolic-action@v0
    with:
      command: list-gpus
      api-key: ${{ secrets.HYPERBOLIC_API_KEY }}

  # Note: rent-gpu and terminate-gpu are not tested in e2e because they
  # incur real costs. Verify list-gpus returns available inventory instead.
