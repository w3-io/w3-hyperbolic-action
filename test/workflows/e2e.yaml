# E2E Test Workflow
#
# Exercises every command against real APIs.
# Run on a local W3 network with:
#   w3 workflow deploy test/workflows/e2e.yaml
#   w3 workflow "hyperbolic-e2e" trigger
#
# Prerequisites:
#   - W3 local network running (make dev)
#   - W3_SECRET_HYPERBOLIC_API_KEY set to a Hyperbolic API key

name: hyperbolic-e2e
on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # ── Text Generation ────────────────────────────────────────────────────

      - name: Chat completion
        uses: w3-io/w3-hyperbolic-action@v0
        with:
          command: chat
          api-key: ${{ secrets.HYPERBOLIC_API_KEY }}
          model: meta-llama/Llama-3.3-70B-Instruct
          messages: '[{"role":"user","content":"Say hello in exactly three words."}]'
          max-tokens: "50"
          temperature: "0.1"

      # ── Image Generation ───────────────────────────────────────────────────
